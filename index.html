<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Healing District</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="hero-content">
            <img src="Logo.png" alt="The Healing District Logo" class="main-logo">
            <p>"Where Skin Glows, Energy Flows!"</p>
        </div>
    </header>

    <section class="services-intro">
        <h2>Explore Our Services</h2>
        <div class="service-grid">
            <div class="service-type">Facial</div>
            <div class="service-type">Body</div>
            <div class="service-type">Wax</div>
        </div>
    </section>

    <section class="gemstone-shop">
        <h2>Gemstone Shop</h2>
        <div class="product-container">
            <div class="product-card">
                <img src="Screenshot 2026-04-16 12.21.47 PM.png" alt="Amethyst Bracelet">
                <h3>Amethyst Ritual Bracelet</h3>
                <p>$13.00</p>
                <button>Add to Ritual</button>
            </div>
            <div class="product-card">
                <img src="Screenshot 2026-04-16 12.21.36 PM.png" alt="Citrine Bracelet">
                <h3>Energy Alignment Bracelet</h3>
                <p>$13.00</p>
                <button>Add to Ritual</button>
            </div>
            <div class="product-card">
                <img src="Screenshot 2026-04-16 12.21.23 PM.png" alt="Sodalite Bracelet">
                <h3>Clarity Gemstone Bracelet</h3>
                <p>$13.00</p>
                <button>Add to Ritual</button>
            </div>
        </div>
    </section>

</body>
</html>
