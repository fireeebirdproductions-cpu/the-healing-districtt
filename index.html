<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Healing District</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <img src="Logo.png" class="nav-logo">
        <ul class="nav-links">
            <li>Home</li>
            <li>Skincare</li>
            <li>Gemstone Shop</li>
            <li>FAQ</li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>DISCOVER YOUR PERFECT SKINCARE ROUTINE</h1>
            <p>Where Skin Glows, Energy Flows!</p>
            <button class="btn-main">Find My Skin Type?</button>
        </div>
    </header>

    <section class="heal-within">
        <h2>Heal From Within</h2>
        <div class="category-grid">
            <div class="cat-card">
                <h3>Gemstones</h3>
                <img src="Gemstones.png">
            </div>
            <div class="cat-card">
                <h3>Skin Care</h3>
                <img src="SkinCare.png">
            </div>
            <div class="cat-card">
                <h3>Merch</h3>
                <img src="Merch.png">
            </div>
        </div>
    </section>

    <section class="services">
        <h2>Explore Our Services</h2>
        <div class="icon-row">
            <div class="icon-item"><img src="Facial.png"><p>Facial</p></div>
            <div class="icon-item"><img src="Body.png"><p>Body</p></div>
            <div class="icon-item"><img src="Wax.png"><p>Wax</p></div>
        </div>
        <button class="btn-soon">Coming Soon</button>
    </section>

</body>
</html>
